name: TIME Magazine

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 0 * * 4' # https://docs.github.com/en/actions/using-workflows/events-that-trigger-workflows#schedule

env:
  Edition_ID: "6548003"
  # Edition_ID: "6548003"
  # https://raw.githubusercontent.com/Monkfishare/TIME_magazine/main/TIME_magazine_database.txt
  # For past edition, check the Edition_ID number in the above txt file
  # To fetch magazine in 2023-12-25, input Edition_ID: "6548003"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:      
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get install -y xdg-utils wget xz-utils python3
          sudo apt-get install -y libxcb-cursor0 libxcb-xinerama0 libegl1 libopengl0

      - name: Install Calibre
        run: |
          sudo -v && wget -nv -O- https://download.calibre-ebook.com/linux-installer.sh | sudo sh /dev/stdin

      - name: Fetch Magazine Epub
        run: |
          wget https://raw.githubusercontent.com/kovidgoyal/calibre/master/recipes/time_magazine.recipe -O time_magazine.recipe
          sed -i "s|https://time.com/magazine|https://time.com/magazine/us/${Edition_ID}|" time_magazine.recipe
          ebook-convert time_magazine.recipe output.epub
          ebook-meta output.epub > epub_metadata.txt
          ebook-meta output.epub --get-cover=cover.jpg

      - name: Extract and Print Published Date
        run: |
          full_title_date=$(grep "Title" epub_metadata.txt | awk -F'[][]' '{print $2}')
          cleaned_date=$(echo "$full_title_date" | sed 's/th//')
          date_only=$(date -d "$cleaned_date" +"%Y-%m-%d")
          echo "$date_only" > published_date.txt
          sed -i "s/^Published\s*:.*/Published           : $date_only/" epub_metadata.txt

      - name: Convert EPUB to PDF
        run: |
          ebook-convert output.epub output.pdf \
              --pdf-page-margin-top 30 \
              --pdf-page-margin-bottom 40 \
              --base-font-size 13 \
              --extra-css "styles.css"

      - name: Compress PDF
        run: |
          pip install pdf-compressor
          pdf-compressor --set-api-key ${{ secrets.PDF_COMPRESSOR_API_KEY }}
          pdf-compressor --compression-level low -i output.pdf
        env:
          PDF_COMPRESSOR_API_KEY: ${{ secrets.PDF_COMPRESSOR_API_KEY }}

      - name: Create TIME Magazine folder
        run: |
          folder_name=$(cat published_date.txt)
          mkdir -p TIME_magazine/"$folder_name"
          mv output.epub TIME_magazine/"$folder_name"/TIME_"$folder_name".epub
          mv output.pdf TIME_magazine/"$folder_name"/TIME_"$folder_name".pdf
          mv cover.jpg TIME_magazine/"$folder_name"/
          mv epub_metadata.txt TIME_magazine/"$folder_name"/

      - name: Commit and Push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add TIME_magazine/*
          git commit -m "Add TIME Magazine"
          git push
